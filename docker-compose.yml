services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: stockbridge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      PORT: 8080
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=stockbridge;Username=postgres;Password=postgres"
      Groq__ApiKey: ${GROQ_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
